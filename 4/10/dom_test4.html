<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="box">클릭</div>
    <style>
      .active {
        background: yellow;
      }
    </style>
    <script>
      const box = document.querySelector(".box");
      box.addEventListener("click", () => {
        box.classList.toggle("active");
      });
    </script>
  </body>
</html>
